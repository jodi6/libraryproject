{% extends "bookmodule/layouts/base.html" %}

{% block content %}
    <h1>Students per City (Lab 8 - Task 7)</h1>
    <table border="1" style="width: 50%; text-align: center;">
        <thead>
            <tr>
                <th>City Name</th>
                <th>Number of Students</th>
            </tr>
        </thead>
        <tbody>
            {% for city in cities %}
            <tr>
                <td>{{ city.city }}</td>
                <td>{{ city.student_count }}</td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="2">No data found.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <br>
    <a href="{% url 'books.index' %}">Back to Home</a>
{% endblock content %}
