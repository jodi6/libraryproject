{% extends "bookmodule/layouts/base.html" %}
{% block content %}
    <h1>Search Results</h1>
    <ul>
        {% for book in books %}
            <li>{{ book.title }} - {{ book.author }}</li>
        {% empty %}
            <li>No books found.</li>
        {% endfor %}
    </ul>
    <a href="{% url 'search' %}">Back to Search</a>
{% endblock content %}
