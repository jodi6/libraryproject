{% extends "bookmodule/layouts/base.html" %}

{% block content %}
    <h1>Search Results</h1>

    {% for obj in books %}
        ID: {{obj.id}}, Title: {{obj.title}}
        <hr>
    {% empty %}
        <p>No books found.</p>
    {% endfor %}

    <br>
    <a href="{% url 'search' %}">Back to Search</a>
{% endblock content %}
